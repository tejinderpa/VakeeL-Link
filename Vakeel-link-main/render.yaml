# Alternate blueprint if the Git root is Vakeel-link-main only.
# Prefer the render.yaml at the monorepo root (Hack-vakeel2/render.yaml)
# which sets rootDir: Vakeel-link-main/backend.

services:
  - type: web
    name: vakeellink-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: "chmod +x ./build.sh && ./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: VakeelLink API
      - key: API_V1_STR
        value: /api/v1
      - key: AUTH_PREFER_LOCAL
        value: "true"
      - key: USE_LOCAL_VECTOR_STORE
        value: "true"
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

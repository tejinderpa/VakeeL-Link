# Render Blueprint — VakeelLink API (free web service)
# =====================================================
# Repo root is Hack-vakeel2 (contains Vakeel-link-main/).
#
# Deploy:
#   1. Push this repo to GitHub (already: tejinderpa/VakeeL-Link).
#   2. https://dashboard.render.com → New → Blueprint → connect repo
#      OR New → Web Service → connect repo and paste settings below.
#   3. Add secret env vars in the Render dashboard (sync: false ones).
#   4. After deploy, open https://YOUR-SERVICE.onrender.com/health
#
# Free tier notes:
#   - Spins down after ~15 min idle (first request is slow).
#   - 512 MB RAM — embedding model may OOM; auth/consultations still work.
#   - Upgrade to Starter if AI RAG is flaky on free.

services:
  - type: web
    name: vakeellink-api
    runtime: python
    region: singapore
    plan: free
    rootDir: Vakeel-link-main/backend
    buildCommand: |
      pip install --upgrade pip
      pip install torch --index-url https://download.pytorch.org/whl/cpu
      pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: VakeelLink API
      - key: API_V1_STR
        value: /api/v1
      - key: AUTH_PREFER_LOCAL
        value: "true"
      - key: USE_LOCAL_VECTOR_STORE
        value: "true"
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      # Comma-separated frontend URLs (set after you deploy Vercel/Netlify)
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
